name: Deploy Web

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Publish site to web branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: web
          folder: dist
          clean: true
          single-commit: true